<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>⚡ MATH · MOBILE PERFECT ⚡</title>
    <style>
        /* === reset & base – mobile first === */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
        }

        body {
            background: radial-gradient(circle at 20% 30%, #1b3f6b, #0a1a2c);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 6px;
            color: white;
            touch-action: pan-x pan-y;
        }

        /* main container – uses exact percentages, no fixed heights that break */
        .game-container {
            width: 100%;
            max-width: 480px;
            height: 100%;
            max-height: 800px;
            background: rgba(10, 22, 40, 0.8);
            backdrop-filter: blur(24px) saturate(200%);
            -webkit-backdrop-filter: blur(24px) saturate(200%);
            border-radius: 44px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8), inset 0 0 0 1px rgba(255,255,255,0.1);
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            border: 2px solid rgba(255,215,0,0.2);
        }

        /* title – scalable */
        h1 {
            font-size: clamp(1.8rem, 7vw, 2.4rem);
            font-weight: 700;
            text-align: center;
            background: linear-gradient(135deg, #ffe792, #ffb77a, #dbb5ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 12px;
            line-height: 1.2;
        }

        /* === stats row – grid for perfect even spacing === */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            background: rgba(0,0,0,0.25);
            border-radius: 60px;
            padding: 12px 10px;
            margin-bottom: 18px;
            border: 1px solid rgba(255,255,200,0.2);
        }

        .stat-card {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            background: #1f3a58;
            padding: 8px 4px;
            border-radius: 40px;
            box-shadow: inset 0 2px 6px #00000060, 0 3px 0 #0f2032;
            font-weight: 600;
            font-size: 0.9rem;
            min-width: 0;  /* allow shrinking */
            white-space: nowrap;
        }
        .stat-card i { font-style: normal; font-size: 1.2rem; width: 24px; text-align: center; }
        .stat-card span { 
            background: #0e223a; 
            padding: 4px 6px; 
            border-radius: 30px; 
            min-width: 38px; 
            text-align: center;
            font-size: 0.95rem;
            box-shadow: inset 0 1px 4px black;
        }
        #high-score-card { background: #4a2f6a; }

        /* === timer bar – isolated === */
        .timer-area {
            margin: 4px 0 16px;
        }
        .timer-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            margin-bottom: 4px;
            color: #c6e0ff;
        }
        .timer-bar {
            width: 100%;
            height: 12px;
            background: #0e2338;
            border-radius: 30px;
            overflow: hidden;
            border: 1px solid #3f6180;
            box-shadow: inset 0 4px 8px #00000080;
        }
        #timer-fill {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #4aff8a, #ffd966, #ff7b7b);
            transition: width 0.1s linear;
        }

        /* === problem display – clear separation === */
        .problem-card {
            background: rgba(255,255,255,0.05);
            border-radius: 70px;
            padding: 20px 10px;
            margin: 8px 0 20px;
            border: 2px solid rgba(255,200,80,0.35);
            box-shadow: inset 0 0 50px #00000090;
        }
        #problem-display {
            font-size: clamp(2.8rem, 13vw, 4.2rem);
            font-weight: 800;
            text-align: center;
            letter-spacing: 2px;
            text-shadow: 0 0 30px #6ae0ff;
            word-break: break-word;
        }

        /* === input & submit – always centered, no overflow === */
        .input-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            margin: 8px 0 16px;
        }
        #answer-input {
            width: 160px;
            max-width: 70%;
            padding: 16px 8px;
            font-size: 2.2rem;
            text-align: center;
            background: #f0f7ff;
            border: none;
            border-radius: 70px;
            color: #0a1f32;
            box-shadow: 0 7px 0 #0f2a44, 0 15px 25px black;
            outline: none;
            font-weight: 700;
        }
        #answer-input:focus {
            outline: 3px solid #fedb8c;
        }
        #submit-btn {
            background: linear-gradient(145deg, #1aa7c3, #0f6b94);
            border: none;
            color: white;
            font-size: 1.8rem;
            font-weight: 800;
            padding: 14px 30px;
            border-radius: 80px;
            min-width: 220px;
            box-shadow: 0 9px 0 #095067, 0 20px 30px black;
            transition: 0.06s;
            cursor: pointer;
            border: 2px solid #b5f0ff;
        }
        #submit-btn:active {
            transform: translateY(6px);
            box-shadow: 0 3px 0 #095067, 0 16px 25px black;
        }

        .feedback {
            background: #1e3655;
            border-radius: 60px;
            padding: 12px 18px;
            margin: 8px 0 16px;
            text-align: center;
            font-size: 1.4rem;
            font-weight: 600;
            border: 1px solid #afcbff;
        }

        /* === action buttons – large gap, equal width === */
        .action-row {
            display: flex;
            gap: 20px;
            margin: 8px 0 18px;
        }
        .action-btn {
            flex: 1;
            background: #2d4462;
            border: none;
            color: white;
            font-size: 1.4rem;
            font-weight: 600;
            padding: 14px 5px;
            border-radius: 60px;
            box-shadow: 0 7px 0 #1a2c44, 0 12px 22px black;
            transition: 0.06s;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            border: 1px solid #9cb9e0;
            white-space: nowrap;
        }
        .action-btn:active {
            transform: translateY(5px);
            box-shadow: 0 2px 0 #1a2c44, 0 10px 18px black;
        }
        #new-game-btn {
            background: linear-gradient(145deg, #9b5984, #643a7c);
            border-color: #e5b9ff;
        }

        /* === settings row – wraps neatly === */
        .settings-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            background: #1c314a;
            border-radius: 60px;
            padding: 12px 18px;
            margin: 8px 0 12px;
            border: 1px solid #8fa9cc;
            gap: 12px 10px;
        }
        .sound-toggle {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 1.1rem;
        }
        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }
        .switch input { opacity:0; width:0; height:0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top:0; left:0; right:0; bottom:0;
            background-color: #38506b;
            border-radius: 34px;
            transition: .3s;
            border: 1px solid #9ab5db;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 2px;
            background-color: #ffffff;
            border-radius: 50%;
            transition: .3s;
        }
        input:checked + .slider {
            background-color: #3aa87d;
        }
        input:checked + .slider:before {
            transform: translateX(26px);
        }
        select {
            background: #1e3650;
            color: white;
            padding: 7px 28px 7px 16px;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 500;
            outline: 1px solid #a0bada;
            appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='white'><path d='M7 10l5 5 5-5z'/></svg>");
            background-repeat: no-repeat;
            background-position: right 8px center;
        }
        .streak-box {
            background: #1f3d5e;
            padding: 6px 18px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1rem;
            color: #ffe49e;
            box-shadow: inset 0 2px 7px black;
            white-space: nowrap;
        }

        .footer {
            background: #0f1e32;
            border-radius: 50px;
            padding: 8px 14px;
            text-align: center;
            color: #c6deff;
            border: 1px solid #5e7fa3;
            font-size: 0.85rem;
            margin-top: 6px;
        }

        /* === game overlay – fits perfectly === */
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(16px);
            border-radius: 44px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: 0.2s;
            padding: 20px;
        }
        .overlay.show {
            opacity: 1;
            pointer-events: all;
        }
        .overlay h2 {
            font-size: 3rem;
            color: #ffb960;
            text-shadow: 0 0 40px red;
            margin-bottom: 16px;
        }
        .overlay p {
            font-size: 2rem;
            margin: 16px 0;
        }
        #restart-btn {
            background: linear-gradient(145deg, #fd746c, #ff9068);
            border: none;
            color: white;
            font-size: 2rem;
            font-weight: bold;
            padding: 16px 48px;
            border-radius: 70px;
            box-shadow: 0 10px 0 #962d22;
            cursor: pointer;
            transition: 0.06s;
        }
        #restart-btn:active {
            transform: translateY(7px);
            box-shadow: 0 3px 0 #962d22;
        }

        /* === ultra-small width adjustments === */
        @media (max-width: 360px) {
            .stats-grid { gap: 4px; padding: 8px 5px; }
            .stat-card { font-size: 0.8rem; }
            .stat-card i { font-size: 1rem; width: 20px; }
            .stat-card span { font-size: 0.8rem; padding: 3px 4px; min-width: 32px; }
            .action-btn { font-size: 1.2rem; }
            .settings-row { flex-direction: column; align-items: stretch; }
        }
        @media (max-height: 650px) {
            .problem-card { padding: 12px 5px; }
            #problem-display { font-size: clamp(2.2rem, 11vw, 3.5rem); }
            .input-area { gap: 12px; }
            #submit-btn { padding: 12px 20px; font-size: 1.6rem; min-width: 200px; }
            .action-btn { padding: 10px 5px; font-size: 1.2rem; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <h1>⚡ MATH · MOBILE ⚡</h1>

    <!-- stats grid – perfect fit -->
    <div class="stats-grid">
        <div class="stat-card"><i>🎯</i><span id="score">0</span></div>
        <div class="stat-card"><i>📊</i><span id="level">1</span></div>
        <div class="stat-card"><i>❤️</i><span id="lives">3</span></div>
        <div class="stat-card" id="high-score-card"><i>🏆</i><span id="high-score">0</span></div>
    </div>

    <!-- timer area -->
    <div class="timer-area">
        <div class="timer-label">
            <span>⏳ time</span>
            <span id="time-indicator">10s</span>
        </div>
        <div class="timer-bar">
            <div id="timer-fill" style="width:100%"></div>
        </div>
    </div>

    <!-- problem -->
    <div class="problem-card">
        <div id="problem-display">6 * 6 = ?</div>
    </div>

    <!-- input & submit -->
    <div class="input-area">
        <input type="number" id="answer-input" inputmode="numeric" placeholder="?">
        <button id="submit-btn">✔ CHECK</button>
    </div>

    <!-- feedback -->
    <div class="feedback" id="feedback-message">✨ enter answer</div>

    <!-- action buttons -->
    <div class="action-row">
        <button class="action-btn" id="skip-btn"><span>⏭</span> SKIP</button>
        <button class="action-btn" id="new-game-btn"><span>🔄</span> NEW</button>
    </div>

    <!-- settings row -->
    <div class="settings-row">
        <div class="sound-toggle">
            <span>🔊</span>
            <label class="switch">
                <input type="checkbox" id="sound-toggle" checked>
                <span class="slider"></span>
            </label>
        </div>
        <select id="difficulty-select">
            <option value="easy">easy</option>
            <option value="medium" selected>medium</option>
            <option value="hard">hard</option>
        </select>
        <div class="streak-box" id="streak-badge">0</div>
    </div>

    <!-- footer -->
    <div class="footer">
        ⏱️ time bonus · streak · high score
    </div>

    <!-- overlay -->
    <div class="overlay" id="game-overlay">
        <h2>GAME OVER</h2>
        <p>score: <span id="final-score">0</span></p>
        <button id="restart-btn">↻ PLAY AGAIN</button>
    </div>
</div>

<script>
    // === GAME LOGIC – same as before, just works ===
    (function() {
        let score = 0, level = 1, lives = 3, streak = 0, highScore = 0;
        let currentProblem = {}, correctAnswersInLevel = 0;
        let timerInterval = null, timeLeft = 10;
        const MAX_TIME = { easy: 15, medium: 10, hard: 7 };
        let processing = false, soundEnabled = true, audioCtx = null;

        const problemEl = document.getElementById('problem-display');
        const answerInput = document.getElementById('answer-input');
        const submitBtn = document.getElementById('submit-btn');
        const skipBtn = document.getElementById('skip-btn');
        const newGameBtn = document.getElementById('new-game-btn');
        const feedbackEl = document.getElementById('feedback-message');
        const scoreEl = document.getElementById('score');
        const levelEl = document.getElementById('level');
        const livesEl = document.getElementById('lives');
        const highScoreEl = document.getElementById('high-score');
        const streakBadge = document.getElementById('streak-badge');
        const timerFill = document.getElementById('timer-fill');
        const timeIndicator = document.getElementById('time-indicator');
        const gameOverlay = document.getElementById('game-overlay');
        const finalScoreSpan = document.getElementById('final-score');
        const restartBtn = document.getElementById('restart-btn');
        const soundToggle = document.getElementById('sound-toggle');
        const difficultySelect = document.getElementById('difficulty-select');

        function updateUI() {
            scoreEl.textContent = score;
            levelEl.textContent = level;
            livesEl.textContent = lives;
            streakBadge.textContent = streak;
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('mathMobileHighScore', highScore);
            }
            highScoreEl.textContent = highScore;
        }

        try {
            const saved = localStorage.getItem('mathMobileHighScore');
            if (saved) highScore = parseInt(saved, 10) || 0;
            highScoreEl.textContent = highScore;
        } catch (e) {}

        function initAudio() {
            try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {
                soundEnabled = false; soundToggle.checked = false; soundToggle.disabled = true;
            }
        }

        function playSound(type) {
            if (!soundEnabled || !audioCtx) return;
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                const now = audioCtx.currentTime;
                if (type === 'correct') {
                    osc.frequency.value = 700;
                    gain.gain.setValueAtTime(0.1, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                    osc.start(now); osc.stop(now + 0.15);
                    setTimeout(() => {
                        if (!soundEnabled) return;
                        const osc2 = audioCtx.createOscillator(), gain2 = audioCtx.createGain();
                        osc2.connect(gain2); gain2.connect(audioCtx.destination);
                        osc2.frequency.value = 1200;
                        gain2.gain.setValueAtTime(0.08, now); gain2.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                        osc2.start(); osc2.stop(now + 0.1);
                    }, 60);
                } else if (type === 'wrong') {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(200, now); osc.frequency.exponentialRampToValueAtTime(70, now + 0.3);
                    gain.gain.setValueAtTime(0.2, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                    osc.start(now); osc.stop(now + 0.3);
                } else if (type === 'levelup') {
                    [500,650,800,950].forEach((f,i) => setTimeout(() => {
                        if (!soundEnabled) return;
                        const o = audioCtx.createOscillator(), g = audioCtx.createGain();
                        o.connect(g); g.connect(audioCtx.destination);
                        o.frequency.value = f;
                        g.gain.setValueAtTime(0.1, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.12);
                        o.start(); o.stop(audioCtx.currentTime + 0.12);
                    }, i*110));
                } else if (type === 'gameover') {
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(150, now); osc.frequency.exponentialRampToValueAtTime(50, now + 0.6);
                    gain.gain.setValueAtTime(0.2, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.6);
                    osc.start(now); osc.stop(now + 0.6);
                }
            } catch (e) {}
        }

        function stopTimer() { if (timerInterval) { clearInterval(timerInterval); timerInterval = null; } }
        function startTimer(seconds) {
            stopTimer();
            timeLeft = seconds;
            timerFill.style.width = '100%';
            timeIndicator.textContent = `${Math.ceil(timeLeft)}s`;
            timerInterval = setInterval(() => {
                if (processing) return;
                timeLeft -= 0.1;
                const percent = Math.max(0, (timeLeft / seconds) * 100);
                timerFill.style.width = `${percent}%`;
                timeIndicator.textContent = `${Math.ceil(timeLeft)}s`;
                if (timeLeft <= 0) {
                    stopTimer();
                    if (!processing && lives > 0) handleTimeout();
                }
            }, 100);
        }

        function handleTimeout() {
            if (processing) return;
            processing = true;
            playSound('wrong');
            feedbackEl.textContent = `⏰ Time out! Answer was ${currentProblem.answer}`;
            feedbackEl.style.color = '#ff7b7b';
            lives--; streak = 0;
            updateUI();
            if (lives <= 0) gameOver();
            else setTimeout(() => { generateProblem(); processing = false; }, 1400);
        }

        function generateProblem() {
            stopTimer();
            const diff = difficultySelect.value;
            const baseRange = diff === 'easy' ? 12 : (diff === 'medium' ? 20 : 40);
            const range = baseRange + level * 2;
            const ops = diff === 'easy' ? ['+', '-'] : (diff === 'medium' ? ['+', '-', '*'] : ['+', '-', '*', '/']);
            const op = ops[Math.floor(Math.random() * ops.length)];
            let num1, num2, answer;
            switch (op) {
                case '+': num1 = Math.floor(Math.random() * range) + 1; num2 = Math.floor(Math.random() * range) + 1; answer = num1 + num2; break;
                case '-': num1 = Math.floor(Math.random() * range) + 5; num2 = Math.floor(Math.random() * num1) + 1; answer = num1 - num2; break;
                case '*': num1 = Math.floor(Math.random() * (range/3)) + 2; num2 = Math.floor(Math.random() * 5) + 2; answer = num1 * num2; break;
                case '/': num2 = Math.floor(Math.random() * 7) + 2; answer = Math.floor(Math.random() * 6) + 2; num1 = num2 * answer; break;
            }
            currentProblem = { num1, num2, op, answer };
            problemEl.textContent = `${num1} ${op} ${num2} = ?`;
            answerInput.value = '';
            feedbackEl.textContent = '✨ enter answer';
            feedbackEl.style.color = 'white';
            startTimer(MAX_TIME[diff] || 10);
            processing = false; submitBtn.disabled = false; answerInput.focus();
        }

        function checkAnswer() {
            if (processing) return;
            const userVal = parseInt(answerInput.value.trim(), 10);
            if (isNaN(userVal)) { feedbackEl.textContent = '❌ enter a number!'; return; }
            stopTimer(); processing = true; submitBtn.disabled = true;
            const correct = (userVal === currentProblem.answer);
            if (correct) {
                const timeBonus = Math.max(0, Math.ceil(timeLeft * 2));
                const streakBonus = streak * 5;
                const earned = 10 * level + timeBonus + streakBonus;
                score += earned; streak++; correctAnswersInLevel++;
                feedbackEl.innerHTML = `✅ CORRECT! +${earned} (⏱️${timeBonus}🔥${streakBonus})`;
                feedbackEl.style.color = '#a3e635';
                playSound('correct');
                if (correctAnswersInLevel >= 5) { level++; correctAnswersInLevel = 0; playSound('levelup'); feedbackEl.innerHTML += ` ⬆️ LEVEL ${level}`; }
            } else {
                playSound('wrong');
                feedbackEl.textContent = `❌ Wrong! Answer = ${currentProblem.answer}`;
                feedbackEl.style.color = '#ff8a8a';
                lives--; streak = 0;
            }
            updateUI();
            if (lives <= 0) gameOver();
            else setTimeout(() => { generateProblem(); }, 1400);
        }

        function skipQuestion() {
            if (processing) return;
            stopTimer(); processing = true; submitBtn.disabled = true;
            playSound('wrong');
            feedbackEl.textContent = `⏩ skipped. Answer: ${currentProblem.answer}`;
            feedbackEl.style.color = '#ffb347';
            lives--; streak = 0;
            updateUI();
            if (lives <= 0) gameOver();
            else setTimeout(() => { generateProblem(); }, 1200);
        }

        function gameOver() {
            stopTimer(); playSound('gameover');
            finalScoreSpan.textContent = score;
            gameOverlay.classList.add('show');
            processing = true;
        }

        function newGame() {
            stopTimer(); gameOverlay.classList.remove('show');
            score = 0; level = 1; lives = 3; streak = 0; correctAnswersInLevel = 0;
            processing = false; submitBtn.disabled = false;
            updateUI(); generateProblem();
        }

        submitBtn.addEventListener('click', (e) => { e.preventDefault(); if (audioCtx?.state === 'suspended') audioCtx.resume(); checkAnswer(); });
        answerInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') { e.preventDefault(); submitBtn.click(); } });
        skipBtn.addEventListener('click', () => { if (audioCtx?.state === 'suspended') audioCtx.resume(); skipQuestion(); });
        newGameBtn.addEventListener('click', newGame);
        restartBtn.addEventListener('click', newGame);
        soundToggle.addEventListener('change', () => { soundEnabled = soundToggle.checked; });
        difficultySelect.addEventListener('change', () => { if (!processing) generateProblem(); });
        answerInput.addEventListener('touchstart', () => answerInput.focus());
        window.addEventListener('load', () => { initAudio(); newGame(); });
        document.addEventListener('touchmove', (e) => { if (e.scale !== 1) e.preventDefault(); }, { passive: false });
    })();
</script>
</body>
</html>
